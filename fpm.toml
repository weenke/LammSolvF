name = "LammSolvF"
version = "0.1.0"
license = "MIT"
author = "Daniil Astapov"
maintainer = "daniil.astapov@aalto.fi"
copyright = "Copyright 2026, Daniil Astapov"

[build]
# stdlib requires preprocessing with fypp; fpm handles this automatically
# when the stdlib-fpm branch is used (pre-preprocessed sources).
auto-executables = true
auto-tests       = false
link = ["lapack", "blas"]

[library]
type = "shared"

[install]
module-dir = "mod"

[dependencies]
stdlib = "*"

[fortran]
implicit-typing    = false
implicit-external  = false
source-form        = "free"

